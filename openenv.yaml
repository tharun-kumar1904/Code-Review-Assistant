spec_version: '1.0'
name: code-review-assistant
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: Gymnasium-style environment for AI-powered pull request code review.
grader: grader:grade

tasks:
  - id: task_001_null_check
    name: Null Check Missing
    description: Missing null check on user object
    difficulty: easy
    grader: tasks.task_001_null_check.grader:grade

  - id: task_002_sql_inject
    name: SQL Injection
    description: SQL injection via f-string query
    difficulty: easy
    grader: tasks.task_002_sql_inject.grader:grade

  - id: task_003_off_by_one
    name: Off By One Error
    description: Off-by-one error plus bare except clause
    difficulty: medium
    grader: tasks.task_003_off_by_one.grader:grade

  - id: task_004_tensor_shape
    name: Tensor Shape Mismatch
    description: PyTorch tensor shape mismatch plus device placement bug
    difficulty: hard
    grader: tasks.task_004_tensor_shape.grader:grade

  - id: task_005_clean_pr
    name: Clean PR
    description: Clean PR with no bugs - should approve
    difficulty: easy
    grader: tasks.task_005_clean_pr.grader:grade

  - id: task_006_race_condition
    name: Race Condition
    description: Race condition in async counter
    difficulty: medium
    grader: tasks.task_006_race_condition.grader:grade

  - id: task_007_hardcoded_secret
    name: Hardcoded Secret
    description: Hardcoded Stripe API key plus bare except
    difficulty: easy
    grader: tasks.task_007_hardcoded_secret.grader:grade

  - id: task_008_n_plus_one
    name: N Plus One Query
    description: N+1 query performance problem
    difficulty: medium
    grader: tasks.task_008_n_plus_one.grader:grade

  - id: task_009_path_traversal
    name: Path Traversal
    description: Path traversal in file download
    difficulty: medium
    grader: tasks.task_009_path_traversal.grader:grade

  - id: task_010_memory_leak
    name: Memory Leak
    description: Unbounded list memory leak
    difficulty: medium
    grader: tasks.task_010_memory_leak.grader:grade

  - id: task_011_type_confusion
    name: Type Confusion
    description: String parameters used in arithmetic
    difficulty: easy
    grader: tasks.task_011_type_confusion.grader:grade

  - id: task_012_clean_refactor
    name: Clean Refactor
    description: Clean async context manager refactor
    difficulty: easy
    grader: tasks.task_012_clean_refactor.grader:grade

  - id: task_013_xss_vulnerability
    name: XSS Vulnerability
    description: XSS via unescaped HTML interpolation
    difficulty: medium
    grader: tasks.task_013_xss_vulnerability.grader:grade

  - id: task_014_error_swallow
    name: Error Swallowing
    description: Bare except plus silent None propagation in retry logic
    difficulty: hard
    grader: tasks.task_014_error_swallow.grader:grade

  - id: task_015_clean_logging
    name: Clean Logging
    description: Clean structured logging implementation
    difficulty: easy
    grader: tasks.task_015_clean_logging.grader:grade
