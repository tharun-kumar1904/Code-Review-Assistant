services:
  # ── PostgreSQL + pgvector ──────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: codereview-db
    environment:
      POSTGRES_DB: codereview
      POSTGRES_USER: codereview
      POSTGRES_PASSWORD: postgres@data123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codereview"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codereview

  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: codereview-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codereview

  # ── FastAPI Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: codereview-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://codereview:postgres%40data123@db:5432/codereview
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codereview
    restart: unless-stopped

  # ── Celery Worker ──────────────────────────────────────────────────
  celery-worker:
    build:
      context: ..
      dockerfile: workers/Dockerfile
    container_name: codereview-worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://codereview:postgres%40data123@db:5432/codereview
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codereview
    restart: unless-stopped

  # ── React Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: codereview-frontend
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - codereview
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: codereview-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - codereview
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: codereview-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: codereview
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./grafana/dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
    depends_on:
      - prometheus
    networks:
      - codereview
    restart: unless-stopped

  # ── RL Training Engine ──────────────────────────────────────────────
  rl-engine:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: codereview-rl
    env_file:
      - ../.env
    volumes:
      - rl-checkpoints:/app/checkpoints
    depends_on:
      - redis
    networks:
      - codereview
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  grafanadata:
  rl-checkpoints:

networks:
  codereview:
    driver: bridge
